name: GitHub Metrics

on:
  schedule:
    # Atualiza diariamente às 03:00 no horário de São Paulo (06:00 UTC).
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-metrics
  cancel-in-progress: true

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Gerar painel do perfil
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: DouglasRibeiroSanguino
          filename: github-metrics.svg
          output_action: commit
          output_condition: data-changed

          # Layout amplo: duas colunas no desktop e uma no celular.
          template: classic
          config_display: large
          config_timezone: America/Sao_Paulo
          config_animations: yes
          config_twemoji: yes
          config_gemoji: yes

          # Resumo geral da conta.
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          base_hireable: no

          # Hábitos e horários de atividade.
          plugin_habits: yes
          plugin_habits_from: 300
          plugin_habits_days: 30
          plugin_habits_facts: no
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_trim: yes

          # Calendário tridimensional de contribuições.
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Linguagens mais usadas.
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 1%
          plugin_languages_details: percentage
          plugin_languages_other: yes
          plugin_languages_colors: "kotlin:#A97BFF, typescript:#3178C6, javascript:#F7DF1E, html:#E34F26, css:#1572B6"

          # Tecnologias/tópicos favoritados, no estilo da referência.
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_sort: activity
          plugin_topics_limit: 16

          # Conquistas do GitHub em formato compacto.
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
          plugin_achievements_limit: 6
          plugin_achievements_secrets: yes

          # Um plugin sem dados não impede a geração dos demais blocos.
          plugins_errors_fatal: no
